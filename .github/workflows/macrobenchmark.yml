name: Macrobenchmark

# Macrobenchmarks require a real or API-level emulator with profileable support.
# This workflow is triggered manually (workflow_dispatch) and on pushes to main,
# so benchmark results are recorded as build artifacts without blocking every PR.
#
# REQ-NFR-08 targets:
#   - Cold start median ≤ 5 000 ms
#   - Warm start median ≤ 3 000 ms

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'benchmark/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Enable KVM for hardware acceleration on the GitHub-hosted Linux runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build benchmark variant of :app and :benchmark
        run: ./gradlew :app:assembleBenchmark :benchmark:assembleBenchmark --no-daemon

      # Run benchmarks on a managed AVD (API 29+, x86_64).
      # suppressErrors=EMULATOR suppresses the "not running on a real device" warning
      # that would otherwise mark the benchmark as failed.
      - name: Run StartupBenchmark on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          profile: pixel_6
          avd-name: benchmark_avd
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew :benchmark:connectedBenchmarkAndroidTest -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.suppressErrors=EMULATOR,LOW-BATTERY,NOT-PROFILEABLE --no-daemon

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: |
            benchmark/build/outputs/connected_android_test_additional_output/
            benchmark/build/outputs/androidTest-results/connected/
          retention-days: 30
