<svg width="640" height="480" viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="640" height="480" fill="#1A0A0A"/>

  <!-- ── Defs ─────────────────────────────────────────────── -->
  <defs>
    <!-- Arrow head -->
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c8a020"/>
    </marker>
    <!-- Dim arrow for loop labels -->
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3d5c3a"/>
    </marker>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Title ─────────────────────────────────────────────── -->
  <text x="320" y="34" fill="#c8a020" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">Figure-8 Compass Calibration</text>
  <text x="320" y="54" fill="#3d7a48" font-size="12" text-anchor="middle">Hold phone face-up and flat — trace a smooth continuous figure-8 in the air</text>

  <!-- ── Divider ────────────────────────────────────────────── -->
  <line x1="40" y1="64" x2="600" y2="64" stroke="#1a2e38" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════════════
       MAIN DIAGRAM — top view of figure-8 path
       Loop 1 center: (460, 210)  radius ~110
       Loop 2 center: (180, 210)  radius ~110
       Crossing: (320, 210)
       ══════════════════════════════════════════════════════════ -->

  <!-- Shadow / glow under path -->
  <path d="M 320,210
           C 345,125 570,125 570,210
           C 570,295 345,295 320,210
           C 295,125  70,125  70,210
           C  70,295 295,295 320,210"
        fill="none" stroke="#1e5a6e" stroke-width="10" opacity="0.35"/>

  <!-- Main figure-8 path (dashed gold) -->
  <path d="M 320,210
           C 345,125 570,125 570,210
           C 570,295 345,295 320,210
           C 295,125  70,125  70,210
           C  70,295 295,295 320,210"
        fill="none" stroke="#c8a020" stroke-width="2.5" stroke-dasharray="10,5"
        filter="url(#glow)"/>

  <!-- ── Direction arrows on path ──────────────────────────── -->
  <!-- Right loop — top arc going right -->
  <line x1="428" y1="127" x2="432" y2="127" stroke="#c8a020" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Right loop — bottom arc going left -->
  <line x1="412" y1="294" x2="408" y2="294" stroke="#c8a020" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Left loop — top arc going left -->
  <line x1="212" y1="127" x2="208" y2="127" stroke="#c8a020" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Left loop — bottom arc going right -->
  <line x1="228" y1="294" x2="232" y2="294" stroke="#c8a020" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Loop labels ───────────────────────────────────────── -->
  <text x="460" y="92" fill="#3d5c3a" font-size="11" text-anchor="middle" font-style="italic">Loop 1</text>
  <text x="180" y="92" fill="#3d5c3a" font-size="11" text-anchor="middle" font-style="italic">Loop 2</text>

  <!-- ══════════════════════════════════════════════════════════
       PHONE ICONS — simplified device silhouettes at 7 positions
       Each shows a top-down view of the phone; rotation hints at
       movement direction / banking angle.
       ══════════════════════════════════════════════════════════ -->

  <!-- Helper macro (inlined): phone at (cx, cy) rotated rot°
       Body: 22×38 rounded rect   Screen: 18×28   Camera dot   Home dot  -->

  <!-- 1 ▸ START / crossing point — flat, pointing up -->
  <g transform="translate(320,210)">
    <rect x="-11" y="-19" width="22" height="38" rx="4" fill="#1e3040" stroke="#d4ac30" stroke-width="1.5"/>
    <rect x="-8"  y="-15" width="16" height="25" rx="2" fill="#2d6e8a" opacity="0.9"/>
    <circle cx="0" cy="14" r="2.5" fill="#d4ac30" opacity="0.6"/>
    <!-- START label below -->
    <text x="0" y="32" fill="#d4ac30" font-size="10" font-weight="700" text-anchor="middle">START</text>
  </g>

  <!-- 2 ▸ Top of right loop — banked left (CCW ~-30°) -->
  <g transform="translate(460,133) rotate(-30)">
    <rect x="-11" y="-19" width="22" height="38" rx="4" fill="#1e3040" stroke="#c8a020" stroke-width="1.5"/>
    <rect x="-8"  y="-15" width="16" height="25" rx="2" fill="#2d6e8a" opacity="0.85"/>
    <circle cx="0" cy="14" r="2.5" fill="#c8a020" opacity="0.6"/>
  </g>

  <!-- 3 ▸ Right of right loop — upright, pointing right -->
  <g transform="translate(570,210) rotate(90)">
    <rect x="-11" y="-19" width="22" height="38" rx="4" fill="#1e3040" stroke="#c8a020" stroke-width="1.5"/>
    <rect x="-8"  y="-15" width="16" height="25" rx="2" fill="#2d6e8a" opacity="0.85"/>
    <circle cx="0" cy="14" r="2.5" fill="#c8a020" opacity="0.6"/>
  </g>

  <!-- 4 ▸ Bottom of right loop — banked right (~+30°) -->
  <g transform="translate(460,289) rotate(30)">
    <rect x="-11" y="-19" width="22" height="38" rx="4" fill="#1e3040" stroke="#c8a020" stroke-width="1.5"/>
    <rect x="-8"  y="-15" width="16" height="25" rx="2" fill="#2d6e8a" opacity="0.85"/>
    <circle cx="0" cy="14" r="2.5" fill="#c8a020" opacity="0.6"/>
  </g>

  <!-- 5 ▸ Top of left loop — banked right (~+30°) -->
  <g transform="translate(180,133) rotate(30)">
    <rect x="-11" y="-19" width="22" height="38" rx="4" fill="#1e3040" stroke="#c8a020" stroke-width="1.5"/>
    <rect x="-8"  y="-15" width="16" height="25" rx="2" fill="#2d6e8a" opacity="0.85"/>
    <circle cx="0" cy="14" r="2.5" fill="#c8a020" opacity="0.6"/>
  </g>

  <!-- 6 ▸ Left of left loop — upright, pointing left -->
  <g transform="translate(70,210) rotate(-90)">
    <rect x="-11" y="-19" width="22" height="38" rx="4" fill="#1e3040" stroke="#c8a020" stroke-width="1.5"/>
    <rect x="-8"  y="-15" width="16" height="25" rx="2" fill="#2d6e8a" opacity="0.85"/>
    <circle cx="0" cy="14" r="2.5" fill="#c8a020" opacity="0.6"/>
  </g>

  <!-- 7 ▸ Bottom of left loop — banked left (~-30°) -->
  <g transform="translate(180,289) rotate(-30)">
    <rect x="-11" y="-19" width="22" height="38" rx="4" fill="#1e3040" stroke="#c8a020" stroke-width="1.5"/>
    <rect x="-8"  y="-15" width="16" height="25" rx="2" fill="#2d6e8a" opacity="0.85"/>
    <circle cx="0" cy="14" r="2.5" fill="#c8a020" opacity="0.6"/>
  </g>

  <!-- ── Banking tip annotation ────────────────────────────── -->
  <!-- Curved brace / tip for right loop -->
  <text x="618" y="165" fill="#3d7a48" font-size="10" text-anchor="middle">tilt</text>
  <text x="618" y="177" fill="#3d7a48" font-size="10" text-anchor="middle">±45°</text>
  <text x="618" y="189" fill="#3d7a48" font-size="10" text-anchor="middle">here</text>
  <line x1="571" y1="160" x2="608" y2="165" stroke="#2d5a70" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="571" y1="260" x2="608" y2="258" stroke="#2d5a70" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="618" y="255" fill="#3d7a48" font-size="10" text-anchor="middle">tilt</text>
  <text x="618" y="267" fill="#3d7a48" font-size="10" text-anchor="middle">±45°</text>
  <text x="618" y="279" fill="#3d7a48" font-size="10" text-anchor="middle">here</text>

  <!-- ── Divider ─────────────────────────────────────────────── -->
  <line x1="40" y1="320" x2="600" y2="320" stroke="#1a2e38" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════════════
       BOTTOM SECTION — axis coverage explainer + sample counts
       ══════════════════════════════════════════════════════════ -->

  <text x="320" y="342" fill="#c8a020" font-size="13" font-weight="700" text-anchor="middle">3-Axis Sphere Coverage</text>
  <text x="320" y="358" fill="#2d6e8a" font-size="11" text-anchor="middle">Tilting during turns fills X &amp; Y axes — straight segments cover Z</text>

  <!-- ── Three axis bars ───────────────────────────────────── -->
  <!-- X axis -->
  <text x="80"  y="382" fill="#d4ac30" font-size="11" font-weight="600" text-anchor="middle">X axis</text>
  <text x="80"  y="394" fill="#3d5c3a"   font-size="10" text-anchor="middle">(roll)</text>
  <rect x="30"  y="400" width="100" height="10" rx="5" fill="#1a2e38"/>
  <rect x="30"  y="400" width="80"  height="10" rx="5" fill="#c8a020" opacity="0.85"/>
  <text x="80"  y="424" fill="#3d5c3a" font-size="10" text-anchor="middle">80 %</text>

  <!-- Y axis -->
  <text x="320" y="382" fill="#d4ac30" font-size="11" font-weight="600" text-anchor="middle">Y axis</text>
  <text x="320" y="394" fill="#3d5c3a"   font-size="10" text-anchor="middle">(pitch)</text>
  <rect x="270" y="400" width="100" height="10" rx="5" fill="#1a2e38"/>
  <rect x="270" y="400" width="80"  height="10" rx="5" fill="#c8a020" opacity="0.85"/>
  <text x="320" y="424" fill="#3d5c3a" font-size="10" text-anchor="middle">80 %</text>

  <!-- Z axis -->
  <text x="560" y="382" fill="#d4ac30" font-size="11" font-weight="600" text-anchor="middle">Z axis</text>
  <text x="560" y="394" fill="#3d5c3a"   font-size="10" text-anchor="middle">(yaw)</text>
  <rect x="510" y="400" width="100" height="10" rx="5" fill="#1a2e38"/>
  <rect x="510" y="400" width="100" height="10" rx="5" fill="#c8a020" opacity="0.85"/>
  <text x="560" y="424" fill="#3d5c3a" font-size="10" text-anchor="middle">100 %</text>

  <!-- ── Divider ─────────────────────────────────────────────── -->
  <line x1="40" y1="435" x2="600" y2="435" stroke="#1a2e38" stroke-width="1"/>

  <!-- ── Sample count legend ───────────────────────────────── -->
  <!-- Threshold 1: 9 samples — ellipsoid fit possible -->
  <circle cx="58"  cy="455" r="5" fill="#2d6e8a"/>
  <text   x="68"   cy="455" y="459" fill="#3d7a48" font-size="11">9 samples — ellipsoid fit possible</text>

  <!-- Threshold 2: 200 samples — Done button unlocks -->
  <circle cx="310" cy="455" r="5" fill="#3d5c3a"/>
  <text   x="320"  cy="455" y="459" fill="#c8a020" font-size="11" font-weight="600">200 samples — Done unlocks</text>

  <!-- Auto-complete note -->
  <text x="320" y="474" fill="#2d6e8a" font-size="10" text-anchor="middle">Auto-completes when 200+ samples and all three axes reach 80 % coverage</text>

</svg>
